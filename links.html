<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vuelta | Links</title>
    <!-- Google Fonts: Anton para titulares masivos, Inter para legibilidad -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Linktree Specific Styles */
        .links-page {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }
        
        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .links-logo {
            height: 80px;
            margin-bottom: 15px;
        }

        .links-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--text-light);
            text-align: center;
            letter-spacing: 2px;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .btn-linktree {
            display: block;
            width: 100%;
            padding: 15px 20px;
            border: 1px solid var(--text-light);
            border-radius: 50px;
            background: transparent;
            color: var(--text-light);
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1rem;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            text-transform: none;
            letter-spacing: 0.5px;
        }

        .btn-linktree:hover {
            background: var(--text-light);
            color: var(--bg-dark);
        }

        /* Botón de WhatsApp destacado */
        .btn-linktree.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-light);
        }

        .btn-linktree.primary:hover {
            background: var(--text-light);
            border-color: var(--text-light);
            color: var(--bg-dark);
        }
    </style>
</head>
<body class="links-page">
    <div class="links-container">
        <img src="assets/logo.png" alt="La Vuelta Logo" class="links-logo">
        <h1 class="links-title">LA VUELTA.</h1>
        
        <div class="links-grid">
            <a href="index.html" class="btn-linktree">🌐 PÁGINA PRINCIPAL</a>
            <a href="https://chat.whatsapp.com/Cp3RDa8gnTD4KBhGJkbCvA?mode=gi_t" class="btn-linktree primary">💬 UNIRSE AL WHATSAPP</a>
            <a href="#" class="btn-linktree">🔥 EVENTOS (PRÓXIMAMENTE)</a>
            <a href="#" class="btn-linktree">👕 MERCH OFICIAL (PRÓXIMAMENTE)</a>
        </div>
    </div>
</body>
</html>
